openapi: 3.0.3
info:
  title: Salesforce Dev31 OAuth API
  version: 1.0.0
  description: OAuth2 Client Credentials flow для отримання access token

servers:
  - url: https://agroarena--aadev1.sandbox.my.salesforce.com

paths:
  /services/oauth2/token:
    post:
      summary: Get OAuth Access Token
      description: Отримання access token через Client Credentials flow
      tags:
        - OAuth

      parameters:
        - name: grant_type
          in: query
          required: true
          schema:
            type: string
            example: client_credentials

        - name: client_id
          in: query
          required: true
          schema:
            type: string
            example: 3MVG9uAc45HBYUrhU3wghpPjGJ0DFpf95KJ8jypuWeKbLcpDT1UxUq3Gfo7HX3L1a3kDBqDitDeIbRLImrIp0

        - name: client_secret
          in: query
          required: true
          schema:
            type: string
            example: 05843203A77C36C85FF3E24B1AADBBE8489F32EA2037AA97E0D2863301A71BAC

      responses:
        "200":
          description: Token received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthResponse"

components:
  schemas:
    OAuthResponse:
      type: object
      properties:
        access_token:
          type: string
          example: 00D7Y000000BEZ5!AQEA...

        token_type:
          type: string
          example: Bearer

        instance_url:
          type: string
          example: https://agroarena--aadev1.sandbox.my.salesforce.com

        scope:
          type: string
          example: api

        issued_at:
          type: string
          example: "1772817726747"

        signature:
          type: string